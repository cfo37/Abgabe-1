<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Match Dashboard</title>

  <script src="node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="node_modules/animejs/lib/anime.min.js"></script>
  <script src="node_modules/dayjs/dayjs.min.js"></script>
  <script src="node_modules/lodash/lodash.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 30px;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #4b5563;
      margin-bottom: 24px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      min-width: 180px;
      flex: 1;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #374151;
    }

    .card p {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f9fafb;
    }

    .team-a {
      color: #065f46;
      font-weight: bold;
    }

    .team-b {
      color: #1d4ed8;
      font-weight: bold;
    }

    .status-win {
      color: green;
      font-weight: bold;
    }

    .status-draw {
      color: darkorange;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Football Match Dashboard</h1>
    <p class="subtitle" id="timestamp"></p>

    <div class="cards">
      <div class="card">
        <h3>Heimteam</h3>
        <p>Bayern</p>
      </div>
      <div class="card">
        <h3>Auswärtsteam</h3>
        <p>Dortmund</p>
      </div>
      <div class="card">
        <h3>Endstand</h3>
        <p id="scoreCard"></p>
      </div>
      <div class="card">
        <h3>Spielstatus</h3>
        <p id="resultCard"></p>
      </div>
    </div>

    <div class="section">
      <h2>Spielerstatistik</h2>
      <table id="playerTable">
        <thead>
          <tr>
            <th>Spieler</th>
            <th>Team</th>
            <th>Tore</th>
            <th>Assists</th>
            <th>Schüsse</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Tore pro Spieler</h2>
      <canvas id="goalChart" width="900" height="320"></canvas>
    </div>
  </div>

  <script>
    const players = [
      { name: "Harry Kane", team: "Bayern", goals: 2, assists: 1, shots: 5 },
      { name: "Musiala", team: "Bayern", goals: 1, assists: 1, shots: 4 },
      { name: "Sané", team: "Bayern", goals: 0, assists: 1, shots: 3 },
      { name: "Malen", team: "Dortmund", goals: 1, assists: 0, shots: 4 },
      { name: "Brandt", team: "Dortmund", goals: 0, assists: 1, shots: 2 },
      { name: "Füllkrug", team: "Dortmund", goals: 1, assists: 0, shots: 3 }
    ];

    // Aktuelles Datum und Uhrzeit anzeigen mit Day.js
    document.getElementById("timestamp").innerText =
      "Letztes Update: " + dayjs().format("DD.MM.YYYY HH:mm:ss");

    // Tore pro Team berechnen mit Lodash
    const bayernGoals = _.sumBy(_.filter(players, { team: "Bayern" }), "goals");
    const dortmundGoals = _.sumBy(_.filter(players, { team: "Dortmund" }), "goals");

    document.getElementById("scoreCard").innerText = bayernGoals + " : " + dortmundGoals;

    const resultCard = document.getElementById("resultCard");
    if (bayernGoals > dortmundGoals) {
      resultCard.innerText = "Bayern gewinnt";
      resultCard.className = "status-win";
    } else if (bayernGoals < dortmundGoals) {
      resultCard.innerText = "Dortmund gewinnt";
      resultCard.className = "status-win";
    } else {
      resultCard.innerText = "Unentschieden";
      resultCard.className = "status-draw";
    }

    const tbody = document.querySelector("#playerTable tbody");

    players.forEach(player => {
      const row = document.createElement("tr");
      const teamClass = player.team === "Bayern" ? "team-a" : "team-b";

      row.innerHTML = `
        <td>${player.name}</td>
        <td class="${teamClass}">${player.team}</td>
        <td>${player.goals}</td>
        <td>${player.assists}</td>
        <td>${player.shots}</td>
      `;
      tbody.appendChild(row);
    });

    const labels = _.map(players, "name");
    const goalValues = _.map(players, "goals");

    const ctx = document.getElementById("goalChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Tore",
          data: goalValues,
          borderWidth: 1
        }]
      },
      options: {
        responsive: false,
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    });

    anime({
      targets: "#title",
      translateY: [-40, 0],
      opacity: [0, 1],
      duration: 1400,
      easing: "easeOutExpo"
    });

    anime({
      targets: ".card",
      translateY: [30, 0],
      opacity: [0, 1],
      delay: anime.stagger(180),
      duration: 1000,
      easing: "easeOutExpo"
    });

    anime({
      targets: ".section",
      opacity: [0, 1],
      delay: anime.stagger(250),
      duration: 1200,
      easing: "easeOutExpo"
    });
  </script>
</body>
</html>
